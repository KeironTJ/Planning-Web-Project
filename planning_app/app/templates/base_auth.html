<!DOCTYPE html>
<html lang="en" data-bs-theme="light" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title | default('') }}{% if title %} — {% endif %}{{ app_name }}{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<body class="bg-body-secondary">
    <!-- Toast notifications for flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
            {% for category, message in messages %}
            <div class="toast show align-items-center text-bg-{{ 'danger' if category == 'error' else category }} border-0 mb-2" role="alert">
                <div class="d-flex">
                    <div class="toast-body">{{ message }}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmO7cFZGVi4G2HxNAA5OtnGqhwh"
            crossorigin="anonymous" defer></script>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
