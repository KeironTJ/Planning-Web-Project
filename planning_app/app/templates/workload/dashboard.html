{% extends 'base.html' %}
{% block content %}
<div class="row g-3">
    {% for team in teams %}
    <div class="col-md-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h6 class="fw-semibold">{{ team.name }}</h6>
                <p class="text-muted small mb-1">{{ team.department or '—' }}</p>
                <p class="text-muted small mb-0">
                    <i class="bi bi-people me-1"></i>{{ team.headcount }} people
                </p>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5 text-muted">
        <i class="bi bi-people fs-1 d-block mb-3"></i>
        <p>No teams configured yet.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
