{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">New Routing Template</h4>
            <a href="{{ url_for('capacity.routing_list') }}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Template Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Standard Suite" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="2"
                                  placeholder="Optional — describe which product types use this routing"></textarea>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" name="is_default" id="is_default" class="form-check-input" value="1">
                        <label class="form-check-label" for="is_default">
                            Set as default template
                            <small class="text-muted d-block">The scheduler uses this template unless another is selected.</small>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Template</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
