{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid py-3">

  <div class="d-flex align-items-center mb-4 gap-3">
    <div class="rounded-3 p-3 bg-dark bg-opacity-10">
      <i class="bi bi-hdd-network fs-2 text-dark"></i>
    </div>
    <div>
      <h4 class="mb-0 fw-semibold">IT</h4>
      <p class="text-muted mb-0 small">System administration and technical tools</p>
    </div>
  </div>

  <div class="row g-3">

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm opacity-75">
        <div class="card-body d-flex align-items-start gap-3 p-4">
          <div class="rounded-3 p-2 bg-dark bg-opacity-10 flex-shrink-0">
            <i class="bi bi-terminal fs-4"></i>
          </div>
          <div>
            <h6 class="fw-semibold mb-1">System Admin <span class="badge bg-secondary ms-1 small">Coming soon</span></h6>
            <p class="text-muted small mb-0">System health, integrations, and configuration</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm opacity-75">
        <div class="card-body d-flex align-items-start gap-3 p-4">
          <div class="rounded-3 p-2 bg-primary bg-opacity-10 flex-shrink-0">
            <i class="bi bi-file-earmark-bar-graph fs-4 text-primary"></i>
          </div>
          <div>
            <h6 class="fw-semibold mb-1">Reports <span class="badge bg-secondary ms-1 small">Coming soon</span></h6>
            <p class="text-muted small mb-0">Custom report builder and data exports</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
