{% if current_user.is_authenticated and current_user.is_admin %}
<div class="border-bottom bg-body-secondary">
    <div class="container-fluid px-3 py-1 d-flex align-items-center gap-2 flex-wrap">
        <span class="text-muted small fw-semibold me-1">Quick Actions</span>
        <div class="vr"></div>
        <button class="btn btn-sm btn-primary" onclick="startErpRefresh()" id="erp-refresh-btn">
            <i class="bi bi-arrow-clockwise me-1"></i>Refresh Data
        </button>
        <a href="{{ url_for('admin.import_upload') }}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-upload me-1"></i>Upload CSV
        </a>
        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-shield-lock me-1"></i>Admin
        </a>
    </div>
</div>
{% endif %}
