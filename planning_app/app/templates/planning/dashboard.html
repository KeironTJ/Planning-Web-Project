{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid py-3">

  <div class="d-flex align-items-center mb-4 gap-3">
    <div class="rounded-3 p-3 bg-info bg-opacity-10">
      <i class="bi bi-calendar2-range fs-2 text-info"></i>
    </div>
    <div>
      <h4 class="mb-0 fw-semibold">Planning</h4>
      <p class="text-muted mb-0 small">Capacity planning and labour management</p>
    </div>
  </div>

  <div class="row g-3">

    <div class="col-12 col-md-6 col-lg-4">
      <a href="{{ url_for('capacity.dashboard') }}" class="text-decoration-none">
        <div class="card h-100 border-0 shadow-sm card-hover">
          <div class="card-body d-flex align-items-start gap-3 p-4">
            <div class="rounded-3 p-2 bg-info bg-opacity-10 flex-shrink-0">
              <i class="bi bi-bar-chart-fill fs-4 text-info"></i>
            </div>
            <div>
              <h6 class="fw-semibold mb-1">Capacity Dashboard</h6>
              <p class="text-muted small mb-0">Department capacity vs demand by week</p>
            </div>
          </div>
        </div>
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <a href="{{ url_for('capacity.labour_plan_list') }}" class="text-decoration-none">
        <div class="card h-100 border-0 shadow-sm card-hover">
          <div class="card-body d-flex align-items-start gap-3 p-4">
            <div class="rounded-3 p-2 bg-primary bg-opacity-10 flex-shrink-0">
              <i class="bi bi-people fs-4 text-primary"></i>
            </div>
            <div>
              <h6 class="fw-semibold mb-1">Labour Plan</h6>
              <p class="text-muted small mb-0">Set available hours per department per week</p>
            </div>
          </div>
        </div>
      </a>
    </div>

  </div>
</div>
{% endblock %}
