{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid py-3">

  <div class="d-flex align-items-center mb-4 gap-3">
    <div class="rounded-3 p-3 bg-secondary bg-opacity-10">
      <i class="bi bi-truck fs-2 text-secondary"></i>
    </div>
    <div>
      <h4 class="mb-0 fw-semibold">Transport</h4>
      <p class="text-muted mb-0 small">Logistics, delivery management, and fleet tools</p>
    </div>
  </div>

  <div class="row g-3">

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm opacity-75">
        <div class="card-body d-flex align-items-start gap-3 p-4">
          <div class="rounded-3 p-2 bg-secondary bg-opacity-10 flex-shrink-0">
            <i class="bi bi-box-arrow-right fs-4 text-secondary"></i>
          </div>
          <div>
            <h6 class="fw-semibold mb-1">Deliveries <span class="badge bg-secondary ms-1 small">Coming soon</span></h6>
            <p class="text-muted small mb-0">Outbound delivery scheduling and tracking</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm opacity-75">
        <div class="card-body d-flex align-items-start gap-3 p-4">
          <div class="rounded-3 p-2 bg-info bg-opacity-10 flex-shrink-0">
            <i class="bi bi-car-front fs-4 text-info"></i>
          </div>
          <div>
            <h6 class="fw-semibold mb-1">Fleet <span class="badge bg-secondary ms-1 small">Coming soon</span></h6>
            <p class="text-muted small mb-0">Vehicle management and maintenance records</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
